<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - تعديل بياناتي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --main-color: #00b894;
      --bg-dark: linear-gradient(135deg, #000000, #003d2e, #001f17);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg-dark);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
      min-height: 100vh;
      padding: 30px;
      color: white;
    }
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    .card {
      background: rgba(27, 27, 27, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 30px;
      margin-bottom: 25px;
      border: 1px solid #00b89455;
    }
    h1 {
      color: #00b894;
      margin-bottom: 10px;
      font-size: 28px;
    }
    h2 {
      color: #00b894;
      margin-bottom: 20px;
      font-size: 20px;
      border-right: 3px solid #00b894;
      padding-right: 12px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #00b894;
    }
    label i {
      margin-left: 8px;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 15px;
      background: rgba(255,255,255,0.1);
      border: 1px solid #00b89455;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: 0.3s;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      border-color: #00b894;
      box-shadow: 0 0 8px #00b894;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    button {
      background: #00b894;
      color: white;
      padding: 14px 28px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
      margin-left: 10px;
      margin-top: 10px;
    }
    button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px #00b894;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #00b894;
    }
    .btn-outline:hover {
      background: #00b894;
      color: #111;
    }
    .btn-danger {
      background: #ff4757;
    }
    .btn-danger:hover {
      box-shadow: 0 0 15px #ff4757;
    }
    .message {
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
    }
    .message-success {
      background: rgba(0,184,148,0.2);
      border: 1px solid #00b894;
      color: #00b894;
    }
    .message-error {
      background: rgba(255,71,87,0.2);
      border: 1px solid #ff4757;
      color: #ff4757;
    }
    .preview-link {
      margin-top: 20px;
      text-align: center;
      padding: 15px;
      background: rgba(0,184,148,0.1);
      border-radius: 16px;
    }
    .preview-link a {
      color: #00b894;
      text-decoration: none;
    }
    hr {
      border-color: #00b89433;
      margin: 20px 0;
    }
    footer {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-top: 20px;
    }
    @media (max-width: 550px) {
      .row-2 {
        grid-template-columns: 1fr;
        gap: 0;
      }
      .container {
        padding: 0;
      }
      .card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1><i class="fas fa-user-edit"></i> لوحة التحكم</h1>
    <p style="margin-bottom: 20px; color: #aaa;">مرحباً بك! يمكنك تعديل بيانات صفحتك الشخصية من هنا</p>
    
    <div id="message-area"></div>
    
    <form id="edit-form">
      <h2><i class="fas fa-user-circle"></i> المعلومات الشخصية</h2>
      
      <div class="form-group">
        <label><i class="fas fa-user"></i> الاسم الكامل</label>
        <input type="text" id="fullName" placeholder="دكتور / أحمد محمد">
      </div>
      
      <div class="form-group">
        <label><i class="fas fa-briefcase"></i> المسمى الوظيفي / التخصص</label>
        <input type="text" id="title" placeholder="استشاري قلب وأوعية دموية">
      </div>
      
      <div class="form-group">
        <label><i class="fas fa-info-circle"></i> نبذة تعريفية</label>
        <textarea id="bio" placeholder="خبرة أكثر من 10 سنوات في مجال..."></textarea>
      </div>
      
      <div class="form-group">
        <label><i class="fas fa-quote-right"></i> الاقتباس أو الشعار</label>
        <input type="text" id="quote" placeholder="“ صحتك تهمنا ”">
      </div>
      
      <div class="form-group">
        <label><i class="fas fa-phone"></i> رقم الهاتف (للتواصل المباشر)</label>
        <input type="tel" id="phone" placeholder="+20123456789">
      </div>
      
      <div class="form-group">
        <label><i class="fas fa-image"></i> رابط الصورة الشخصية</label>
        <input type="text" id="profileImage" placeholder="https://example.com/photo.jpg">
        <small style="color:#aaa; display:block; margin-top:5px;">ضع رابط مباشر لصورتك (أو استخدم خدمة رفع الصور)</small>
      </div>
      
      <hr>
      
      <h2><i class="fas fa-share-alt"></i> روابط التواصل الاجتماعي</h2>
      
      <div class="row-2">
        <div class="form-group">
          <label><i class="fab fa-facebook"></i> فيسبوك</label>
          <input type="text" id="facebook" placeholder="https://facebook.com/...">
        </div>
        
        <div class="form-group">
          <label><i class="fab fa-instagram"></i> انستغرام</label>
          <input type="text" id="instagram" placeholder="https://instagram.com/...">
        </div>
        
        <div class="form-group">
          <label><i class="fab fa-whatsapp"></i> واتساب</label>
          <input type="text" id="whatsapp" placeholder="https://wa.me/20123456789">
        </div>
        
        <div class="form-group">
          <label><i class="fab fa-telegram"></i> تليجرام</label>
          <input type="text" id="telegram" placeholder="https://t.me/...">
        </div>
        
        <div class="form-group">
          <label><i class="fab fa-tiktok"></i> تيك توك</label>
          <input type="text" id="tiktok" placeholder="https://tiktok.com/@...">
        </div>
        
        <div class="form-group">
          <label><i class="fab fa-snapchat-ghost"></i> سناب شات</label>
          <input type="text" id="snapchat" placeholder="https://snapchat.com/add/...">
        </div>
        
        <div class="form-group">
          <label><i class="fab fa-x-twitter"></i> تويتر (X)</label>
          <input type="text" id="twitter" placeholder="https://twitter.com/...">
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-globe"></i> رابط مخصص</label>
          <input type="text" id="customUrl" placeholder="https://example.com">
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-tag"></i> عنوان الرابط المخصص</label>
          <input type="text" id="customTitle" placeholder="موقعي الشخصي">
        </div>
      </div>
      
      <hr>
      
      <div style="display: flex; flex-wrap: wrap; gap: 10px;">
        <button type="button" id="save-btn"><i class="fas fa-save"></i> حفظ التغييرات</button>
        <button type="button" id="preview-btn" class="btn-outline"><i class="fas fa-eye"></i> معاينة صفحتي</button>
        <button type="button" id="logout-btn" class="btn-danger"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
      </div>
    </form>
  </div>
  
  <div class="preview-link" id="preview-link-area" style="display: none;">
    <i class="fas fa-link"></i> رابط صفحتك العامة: 
    <a href="#" target="_blank" id="page-url"></a>
  </div>
  
  <footer>جميع الحقوق محفوظة © 2025 | منصة العملاء الذكية</footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDSla_cxcu-w0da5XEggB5Yaik-no4j90s",
  authDomain: "dashboardc-9b0bc.firebaseapp.com",
  databaseURL: "https://dashboardc-9b0bc-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dashboardc-9b0bc",
  storageBucket: "dashboardc-9b0bc.firebasestorage.app",
  messagingSenderId: "297957699927",
  appId: "1:297957699927:web:5b4f1db24e415494fcce12"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// جلب username من URL
const urlParams = new URLSearchParams(window.location.search);
let currentUsername = urlParams.get('username');

// إذا لم يكن في الرابط، نحاول نجيب من localStorage
if (!currentUsername) {
  const saved = localStorage.getItem('currentClient');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      currentUsername = data.username;
    } catch(e) {
      console.error("خطأ في قراءة localStorage", e);
    }
  }
}

async function loadUserData(username) {
  const userRef = ref(db, `users/${username}`);
  const snapshot = await get(userRef);
  
  if (snapshot.exists()) {
    const data = snapshot.val();
    
    document.getElementById('fullName').value = data.fullName || '';
    document.getElementById('title').value = data.title || '';
    document.getElementById('bio').value = data.bio || '';
    document.getElementById('quote').value = data.quote || '';
    document.getElementById('phone').value = data.phone || '';
    document.getElementById('profileImage').value = data.profileImage || '';
    
    const social = data.socialLinks || {};
    document.getElementById('facebook').value = social.facebook || '';
    document.getElementById('instagram').value = social.instagram || '';
    document.getElementById('whatsapp').value = social.whatsapp || '';
    document.getElementById('telegram').value = social.telegram || '';
    document.getElementById('tiktok').value = social.tiktok || '';
    document.getElementById('snapchat').value = social.snapchat || '';
    document.getElementById('twitter').value = social.twitter || '';
    
    const custom = data.customLink || {};
    document.getElementById('customUrl').value = custom.url || '';
    document.getElementById('customTitle').value = custom.title || '';
  }
}

// التحقق من تسجيل الدخول
onAuthStateChanged(auth, async (user) => {
  if (!user || !currentUsername) {
    window.location.href = 'login.html';
    return;
  }
  await loadUserData(currentUsername);
});

// حفظ التغييرات
document.getElementById('save-btn').addEventListener('click', async () => {
  const messageArea = document.getElementById('message-area');
  
  try {
    const updatedData = {
      fullName: document.getElementById('fullName').value,
      title: document.getElementById('title').value,
      bio: document.getElementById('bio').value,
      quote: document.getElementById('quote').value,
      phone: document.getElementById('phone').value,
      profileImage: document.getElementById('profileImage').value,
      socialLinks: {
        facebook: document.getElementById('facebook').value,
        instagram: document.getElementById('instagram').value,
        whatsapp: document.getElementById('whatsapp').value,
        telegram: document.getElementById('telegram').value,
        tiktok: document.getElementById('tiktok').value,
        snapchat: document.getElementById('snapchat').value,
        twitter: document.getElementById('twitter').value
      },
      customLink: {
        url: document.getElementById('customUrl').value,
        title: document.getElementById('customTitle').value
      }
    };
    
    const userRef = ref(db, `users/${currentUsername}`);
    await update(userRef, updatedData);
    
    messageArea.innerHTML = '<div class="message message-success">✅ تم حفظ التغييرات بنجاح! صفحتك تم تحديثها فوراً.</div>';
    setTimeout(() => {
      messageArea.innerHTML = '';
    }, 3000);
    
  } catch (error) {
    console.error(error);
    messageArea.innerHTML = '<div class="message message-error">❌ حدث خطأ أثناء الحفظ، حاول مرة أخرى</div>';
  }
});

// معاينة الصفحة
document.getElementById('preview-btn').addEventListener('click', () => {
  const pageUrl = `https://${currentUsername}.a-different.com`;
  const previewArea = document.getElementById('preview-link-area');
  const pageUrlLink = document.getElementById('page-url');
  
  pageUrlLink.href = pageUrl;
  pageUrlLink.textContent = pageUrl;
  previewArea.style.display = 'block';
  
  window.open(pageUrl, '_blank');
});

// تسجيل الخروج
document.getElementById('logout-btn').addEventListener('click', async () => {
  await signOut(auth);
  localStorage.removeItem('currentClient');
  window.location.href = 'login.html';
});
</script>

</body>
</html>
